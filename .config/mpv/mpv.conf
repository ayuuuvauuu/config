ytdl-format=bestvideo[height<=720]+bestaudio/best[height<=720] --extractor-args="youtube:player_client=default,ios"
script-opts=ytdl_hook-try_ytdl_first=yes
cache-secs=90
demuxer-readahead-secs=90
cache-pause=yes
cache-pause-wait=5
demuxer-max-bytes=150M
demuxer-max-back-bytes=50M
save-position-on-quit=yes


# ====================================================================
# >>> CURRENT MODE: GPU (lines below are uncommented) <<<
# Switch: comment ALL lines in GPU block, uncomment ALL in battery block
# ====================================================================

# --- BATTERY SAVING (CPU / no GPU) ---
# hwdec=no
# vo=xv
# deband=yes
# scale=bilinear
# cscale=bilinear
# dscale=bilinear
# video-sync=display-resample
# audio-channels=stereo
# cache-secs=30
# osc=no
# stop-screensaver=yes

# --- GPU MODE (NVIDIA nvdec) ---
vo=gpu-next
deband=yes
hwdec=nvdec
gpu-api=vulkan
profile=gpu-hq
gpu-shader-cache=yes
gpu-shader-cache-dir=~/.cache/mpv/shaders
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
video-sync=display-resample
interpolation=yes
tscale=oversample
audio-channels=auto
keep-open=always
cache=yes
